spring:
  application:
    name: order-api

  datasource:
    url: jdbc:postgresql://localhost:5432/orderflow
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest

server:
  port: 8080

logging:
  level:
    com.elizeu.orderapi: DEBUG
    org.springframework.amqp: INFO
